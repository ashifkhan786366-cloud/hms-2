services:
  - type: web
    name: hms-sankhla
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /empty.txt
    autoDeploy: true
    envVars:
      # ── Aiven PostgreSQL ──
      # Set these in Render Dashboard > Environment (not here for security)
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      # ── App Settings ──
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: INIT_TOKEN
        value: hms-sankhla-init-2024
